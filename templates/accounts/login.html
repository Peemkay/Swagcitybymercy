{% extends "base.html" %}
{% block title %}Login{% endblock %}
{% block content %}
<section class="container py-5" style="max-width:420px;">
    <div class="section-title reveal">
        <h2>Login</h2>
    </div>
    <form method="post" novalidate class="reveal">
        {% csrf_token %}
        <div class="mb-3">
            <label class="form-label small text-uppercase">Username</label>
            {{ form.username }}
        </div>
        <div class="mb-3">
            <label class="form-label small text-uppercase">Password</label>
            {{ form.password }}
        </div>
        {% if form.errors %}
            <div class="alert alert-danger">Please enter a correct username and password.</div>
        {% endif %}
        <button type="submit" class="btn btn-scm w-100">Login</button>
    </form>
    <p class="text-center small mt-3">Don't have an account? <a href="{% url 'accounts:signup' %}">Sign up</a></p>
</section>
{% endblock %}
